name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            archive: or-tools_amd64_ubuntu-24.04_cpp_v9.15.6755.tar.gz
          - os: ubuntu-24.04-arm
            # Built on an older glibc; forward-compatible on 24.04.
            archive: or-tools_aarch64_AlmaLinux-8.10_cpp_v9.15.6755.tar.gz
          - os: macos-latest
            archive: or-tools_arm64_macOS-26.2_cpp_v9.15.6755.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache the OR-Tools archive
        id: ortools-cache
        uses: actions/cache@v4
        with:
          path: .ortools
          key: ortools-v9.15-${{ matrix.os }}

      - name: Fetch OR-Tools
        if: steps.ortools-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ortools && cd .ortools
          curl -sfL -o ortools.tar.gz \
            "https://github.com/google/or-tools/releases/download/v9.15/${{ matrix.archive }}"
          tar xzf ortools.tar.gz && rm ortools.tar.gz && mv or-tools_* v9.15

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Run the nurse_scheduling example
        run: cargo run -p oxidor-cpsat --example nurse_scheduling

      - name: Pure model building without the native library
        run: cargo check -p oxidor --no-default-features --features cpsat,mathopt
        env:
          ORTOOLS_PREFIX: /nonexistent

      - name: Cache the prebuilt static bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/oxidor
          key: oxidor-prebuilt-${{ matrix.os }}-${{ hashFiles('oxidor-sys/prebuilt-checksums.txt') }}

      - name: End-to-end download-prebuilt (static bundle from our release)
        # Empty ORTOOLS_PREFIX forces the download path; this exercises the
        # real release asset, the SHA-256 gate, static linking, and — through
        # routing/algorithms/callbacks — every shim entry point compiled
        # against the bundle headers (MathOpt excepted: its solver registry
        # needs the dynamic library, covered by the workspace test above).
        run: >
          cargo test -p oxidor-cpsat -p oxidor-routing -p oxidor-algorithms
          --features oxidor-sys/download-prebuilt,oxidor-cpsat/callbacks
          --test solve --test callbacks
        env:
          ORTOOLS_PREFIX: ""
