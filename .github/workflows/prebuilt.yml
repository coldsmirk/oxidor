# Builds static OR-Tools libraries per platform — the artifacts behind the
# `download-prebuilt` mode of oxidor-sys (`cargo add oxidor` with no local
# OR-Tools setup).
#
# Trigger manually (workflow_dispatch); each job takes on the order of an
# hour because BUILD_DEPS compiles abseil/protobuf/SCIP/HiGHS from source.
#
# Publishing is manual (see AGENTS.md "Prebuilt bundles"): download the
# artifacts, attach them to a release, regenerate prebuilt-checksums.txt.
# Release assets are immutable once a crate pinning their checksums has
# shipped — republish under a new tag instead of replacing an asset.
name: prebuilt-ortools

on:
  workflow_dispatch:

env:
  ORTOOLS_TAG: v9.15

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout OR-Tools
        uses: actions/checkout@v4
        with:
          repository: google/or-tools
          ref: ${{ env.ORTOOLS_TAG }}

      - name: Force static dependency builds
        # Upstream hard-codes shared libraries for every BUILD_DEPS
        # dependency (cmake/dependencies/CMakeLists.txt); a static bundle
        # needs them static, and there is no option for it.
        run: |
          sed -i.bak \
            -e 's/set(BUILD_SHARED_LIBS ON)/set(BUILD_SHARED_LIBS OFF)/' \
            -e 's/set(protobuf_BUILD_SHARED_LIBS ON)/set(protobuf_BUILD_SHARED_LIBS OFF)/' \
            cmake/dependencies/CMakeLists.txt
          rm cmake/dependencies/CMakeLists.txt.bak
          # bzip2 has its own switches and defaults to shared-only; add the
          # static target alongside (the shared one keeps or-tools's target
          # graph intact).
          perl -pi -e 's/set\(ENABLE_LIB_ONLY ON\)/set(ENABLE_LIB_ONLY ON)\n  set(ENABLE_STATIC_LIB ON)/' \
            cmake/dependencies/CMakeLists.txt
          # Each replacement is guarded separately: a silent miss (upstream
          # renamed a line) must fail the build, not slip through.
          grep -q 'set(BUILD_SHARED_LIBS OFF)' cmake/dependencies/CMakeLists.txt
          grep -q 'set(protobuf_BUILD_SHARED_LIBS OFF)' cmake/dependencies/CMakeLists.txt
          grep -q 'set(ENABLE_STATIC_LIB ON)' cmake/dependencies/CMakeLists.txt

      - name: Configure (static, vendored dependencies)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DBUILD_DEPS=ON
          -DBUILD_BZip2=ON
          -DBUILD_SAMPLES=OFF
          -DBUILD_EXAMPLES=OFF
          -DBUILD_TESTING=OFF
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/prefix

      - name: Build and install
        run: cmake --build build --config Release -j 4 --target install

      - name: Merge every static library into one bundle
        # Upstream's install step ships only part of the vendored archives
        # (bzip2, SCIP, and friends stay in the build tree), so collect from
        # both — installed archives win on name collisions.
        run: |
          libdir=prefix/lib; [ -d prefix/lib64 ] && libdir=prefix/lib64
          mkdir -p bundle/lib merged_inputs
          cp -R prefix/include bundle/include
          for archive in "$libdir"/*.a; do
            cp "$archive" "merged_inputs/$(basename "$archive")"
          done
          # Dependency archives land in build/lib (the archive output
          # directory), not under _deps; sweep the whole build tree.
          find build -name '*.a' -not -path '*CMakeFiles*' | while read -r archive; do
            base=$(basename "$archive")
            [ -e "merged_inputs/$base" ] || cp "$archive" "merged_inputs/$base"
          done
          ls merged_inputs | wc -l
          if [ "$(uname)" = "Darwin" ]; then
            libtool -static -o bundle/lib/libortools.a merged_inputs/*.a
          else
            {
              echo "create bundle/lib/libortools.a"
              for archive in merged_inputs/*.a; do echo "addlib $archive"; done
              echo "save"
              echo "end"
            } | ar -M
          fi

      - name: Package
        run: |
          tar czf "oxidor-ortools-${ORTOOLS_TAG}-${{ matrix.target }}.tar.gz" -C bundle .
          shasum -a 256 "oxidor-ortools-${ORTOOLS_TAG}-${{ matrix.target }}.tar.gz" \
            > "oxidor-ortools-${ORTOOLS_TAG}-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: oxidor-ortools-${{ env.ORTOOLS_TAG }}-${{ matrix.target }}
          path: oxidor-ortools-${{ env.ORTOOLS_TAG }}-${{ matrix.target }}.tar.gz*
          retention-days: 30
